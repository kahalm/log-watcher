name: Build & Push Docker Image

on:
  push:
    branches: [main]          # -> :dev (Vorschau)
    tags: ['v*']              # -> :latest + :x.y.z (Prod, tag-gated)

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Build-Zeitstempel setzen
        run: echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/kahalm/log-watcher
          tags: |
            type=raw,value=dev,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            BUILD_TIME=${{ env.BUILD_TIME }}
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          # Labels (u.a. org.opencontainers.image.revision/version) ins Image backen,
          # damit man später am laufenden Image den Git-Commit/die Version ablesen kann.
          labels: ${{ steps.meta.outputs.labels }}
