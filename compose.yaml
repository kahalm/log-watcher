services:
  log-watcher:
    build: .
    image: ghcr.io/kahalm/log-watcher:latest
    container_name: log-watcher
    restart: unless-stopped
    env_file: .env
    stop_grace_period: 20s        # SIGTERM -> sauberes Herunterfahren (Loop bricht ab)
    volumes:
      - ./data:/data              # State (Dedupe/Cooldown) + Heartbeat persistent
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 60s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - monitored

# Externes Netz, in dem Elasticsearch erreichbar ist.
# Für den rookhub-Prod-Stack ist das "rookhub_rookhub" (ermittelt via: docker network ls | grep rookhub).
# Alternativ ES_URL in .env auf die gepublishte Host-Adresse setzen (http://<host>:9200) und
# diesen networks-Block entfernen.
networks:
  monitored:
    external: true
    name: ${MONITORED_NETWORK:-rookhub_rookhub}
