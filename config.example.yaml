# Multi-Target-Konfiguration (Feature 17) — aktiviert via CONFIG_FILE=/data/config.yaml
#
# EIN Container kann mehrere Index-Gruppen UND mehrere Elasticsearch-Instanzen überwachen:
# jedes Target hat sein eigenes `es_url` (+ optional `es_api_key` ODER `es_user`/`es_pass`).
# Reads, Alert-Indizierung und Digest laufen je Target gegen DESSEN Elasticsearch.
#
# `defaults` werden auf JEDES Target angewandt; danach greifen die target-spezifischen Keys.
# Jedes Target erbt zunächst die ENV-Defaults. Globale Loop-/Server-Settings (Intervall,
# Heartbeat, HTTP-Port, State-Datei, Digest) übernimmt der Container vom ERSTEN Target —
# am besten in `defaults` setzen. Feldnamen = ENV-Keys in Kleinbuchstaben (ES_INDICES -> es_indices).

defaults:
  window_hours: 6
  # Eigenes (größeres) Fenster nur für die Per-Index-Stille-Prüfung; vermeidet Fehlalarme
  # bei bursty Low-Volume-Indizes (z.B. crawler-logs). 0 = aus.
  index_silent_window_hours: 24
  interval_seconds: 21600
  cooldown_hours: 12
  # Security-Heuristik (API-Abklopfen erkennen) ist standardmäßig an; hier justierbar
  # oder per Target ausschaltbar (security_check: false) — z.B. für Targets ohne HTTP-Zugriffslogs.
  # security_check: true
  # security_scan_min_4xx: 40
  # security_scan_min_paths: 15
  # security_auth_fail_threshold: 25
  # gemeinsamer Kanal-/State-/HTTP-Teil:
  # smtp_host: smtp.example.com
  # smtp_from: log-watcher@oberschmid.homes
  # smtp_to: [p.oberschmid@cp-solutions.at]
  discord_webhook_url: https://discord.com/api/webhooks/XXXX/YYYY
  state_file: /data/state.json
  heartbeat_file: /data/heartbeat
  http_port: 8080
  digest_enabled: true
  digest_hour: 7

targets:
  # ── ES-Instanz A (rookhub) ──────────────────────────────────────────────────
  - name: rookhub
    es_url: http://host.docker.internal:9200
    es_indices: [rookhub-logs-*, crawler-logs-*]
    # Linux-System-Logs (Filebeat/journald von Host + VMs) mitüberwachen:
    # SSH-Brute-Force, OOM-Kills, Disk-Fehler, Unit-Failures, verstummte Hosts.
    linux_indices: [filebeat-*]
    alert_index_prefix: log-watcher-alerts

  # ── ES-Instanz B (anderer Host/Port, eigener API-Key) ───────────────────────
  - name: lernkompass
    es_url: http://10.24.12.20:9200
    es_api_key: BASE64_API_KEY_HIER
    es_indices: [lernkompass-logs-*]
    min_errors: 10
    alert_index_prefix: log-watcher-alerts

  # ── ES-Instanz C (Basic-Auth, saisonale Baseline) ──────────────────────────
  - name: piratechess
    es_url: https://es.piratechess.intern:9200
    es_user: watcher
    es_pass: CHANGEME
    es_indices: [piratechess-logs-*]
    baseline_mode: last_week
    alert_index_prefix: log-watcher-alerts
    # ECS-Logs legen das Roh-Template unter labels.MessageTemplate ab (NICHT unter dem
    # Default messageTemplate.keyword) — ohne diese Zeile bleiben error_messages/Neu-
    # Signatur-Erkennung UND der warn_spike_ignore-Abgleich leer.
    message_field: labels.MessageTemplate
    # By-design-WARN-Templates aus dem warn_spike-Count herausrechnen, damit sie keine
    # Fehlalarme auslösen:
    #   - "curl exited with code …": softFail + Retry bei wackeligem VPN-Exit während
    #     Chessable-Imports (kein Vorfall).
    #   - "WIEDERHOLT SCHLECHT": kumulativer Bad-Phase-Zähler pro VPN-IP, klettert bei
    #     langen Importen zwangsläufig hoch, obwohl die Block-Rate niedrig bleibt.
    #   - "übersprang eine Linie/Kapitel": Toleranz-Diagnose des Kurs-Reconstruct — abge-
    #     schnittene/korrupte GECACHTE Kapitel-/Linien-JSONs werden übersprungen statt den
    #     Export zu killen (1 WARN je Skip). Die Summenzeile ("mit N übersprungenen Linien/
    #     Kapiteln") wird BEWUSST NICHT ignoriert, damit ein echter Skip-Ausschlag alarmiert.
    warn_spike_ignore:
      - "curl exited with code"
      - "WIEDERHOLT SCHLECHT"
      - "übersprang eine Linie/Kapitel"
